<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<title>Option A — compact (resting)</title><link rel="stylesheet" href="/mockup_common.css"></head>
<body><div class="wrap">
<div class="frame-label">OPTION A · resting state — Close tab shows a <b>compact list</b> in the narrow column (SYM · TQS · reason · R · P&L). Small <b>"⤢ Expand"</b> button (top-right of feed) opens the full table on demand.</div>
<div id="top"></div>
<div class="grid" style="grid-template-columns:30% 1fr 24%">
  <div class="col"><div class="panel" style="flex:1">
    <div id="tabs"></div>
    <div class="closehd" style="padding:7px 9px">
      <div class="summary" style="font-size:10px;gap:9px"><span>48</span><span>WR <b class="green">64%</b></span><span class="green">+$3,914</span><span>+18.4R</span></div>
      <div style="display:flex;gap:5px;align-items:center"><div class="range"><button>T</button><button class="on">7d</button><button>30d</button></div><button class="expandbtn">⤢ Expand</button></div>
    </div>
    <div class="feed" style="padding:4px 6px" id="clist"></div>
  </div></div>
  <div class="col"><div class="panel" style="flex:1">
    <div class="chart-hd"><div style="display:flex;gap:10px;align-items:center"><span class="mono" style="font-weight:700;font-size:15px">NVDA</span><span class="mono green">121.40 ▲ +2.84%</span><span class="pill">5m</span></div></div>
    <div class="chart-body"><div class="candles" id="cnd"></div><div class="watermark">chart — wide</div></div>
  </div></div>
  <div class="col" id="right"></div>
</div></div>
<script src="/mockup_shared.js"></script><script>
document.getElementById('top').outerHTML=TOPBAR;
document.getElementById('tabs').outerHTML=tabbar('close');
document.getElementById('clist').innerHTML=compactList();
document.getElementById('right').innerHTML=RIGHTCOL;
paintCandles('cnd');
</script></body></html>
